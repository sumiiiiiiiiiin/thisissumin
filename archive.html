    <script>
        // ── ADD YOUR OWN PHOTOS HERE ──────────────────────────────────────────────
        const photos = [
            { name: 'justwalk01.jpg', date: 'May 01, 2024', size: '1.4 MB', url: 'images/justwalk01.jpg', tags: ['poster', 'graphic'] },
            { name: 'justwalk02.jpg', date: 'May 01, 2024', size: '2.2 MB', url: 'images/justwalk02.jpg', tags: ['poster', 'graphic'] },
            { name: 'justwalk03.jpg', date: 'May 01, 2024', size: '1.1 MB', url: 'images/justwalk03.jpg', tags: ['poster', 'graphic'] },
            { name: 'justwalk04.jpg', date: 'May 01, 2024', size: '2.0 MB', url: 'images/justwalk04.jpg', tags: ['poster', 'graphic'] },
            { name: 'justwalk05.jpg', date: 'May 01, 2024', size: '2.5 MB', url: 'images/justwalk05.jpg', tags: ['poster', 'graphic'] },
            { name: 'kitchen01.jpg', date: 'Jan 30, 2025', size: '1.1 MB', url: 'images/kitchen01.jpg', tags: ['3d'] },
            { name: 'kitchen02.jpg', date: 'Jan 30, 2025', size: '1.2 MB', url: 'images/kitchen02.jpg', tags: ['3d'] },
            { name: 'kitchen03.jpg', date: 'Jan 30, 2025', size: '2.1 MB', url: 'images/kitchen03.jpg', tags: ['3d'] },
            { name: 'kitchen04.jpg', date: 'Jan 30, 2025', size: '1.1 MB', url: 'images/kitchen04.jpg', tags: ['3d'] },
            { name: 'kitchen05.jpg', date: 'Jan 30, 2025', size: '1.1 MB', url: 'images/kitchen05.jpg', tags: ['3d'] },
            { name: 'timeline.png', date: 'May 2, 2024', size: '3.5 MB', url: 'images/timeline.png', tags: ['information', 'graphic'] },
        ];
        // ─────────────────────────────────────────────────────────────────────────

        const TAG_COLORS = {
            '3d': '#ff5f57', graphic: '#0071e3', information: '#28c840', poster: '#ff9f0a',
        };

        let selectedIdx = null;
        let activeTag = 'all';

        const allTags = [...new Set(photos.flatMap(p => p.tags))].sort();

        function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

        // ── sidebar ──
        function buildSidebar() {
            const list = document.getElementById('tagList');
            allTags.forEach(tag => {
                const color = TAG_COLORS[tag] || '#636366';
                const div = document.createElement('div');
                div.className = 'sidebar-item';
                div.id = 'sidebar-' + tag;
                div.innerHTML = `<span class="tag-dot" style="background:${color}"></span>${cap(tag)}`;
                div.onclick = () => filterByTag(tag);
                list.appendChild(div);
            });
        }

        // ── mobile tag bar ──
        function buildTagBar() {
            const bar = document.getElementById('tagBar');
            const all = document.createElement('button');
            all.className = 'tag-bar-pill active';
            all.id = 'mob-all';
            all.textContent = 'All';
            all.onclick = () => filterByTag('all');
            bar.appendChild(all);
            allTags.forEach(tag => {
                const color = TAG_COLORS[tag] || '#636366';
                const btn = document.createElement('button');
                btn.className = 'tag-bar-pill';
                btn.id = 'mob-' + tag;
                btn.innerHTML = `<span style="width:7px;height:7px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0"></span>${cap(tag)}`;
                btn.onclick = () => filterByTag(tag);
                bar.appendChild(btn);
            });
        }

        // ── filter ──
        function filterByTag(tag) {
            activeTag = tag;
            selectedIdx = null;
            closePreview(false);

            // update sidebar
            document.getElementById('sidebar-all').classList.toggle('active', tag === 'all');
            allTags.forEach(t => {
                const el = document.getElementById('sidebar-' + t);
                if (el) el.classList.toggle('active', t === tag);
            });
            // update mobile bar
            document.getElementById('mob-all').classList.toggle('active', tag === 'all');
            allTags.forEach(t => {
                const el = document.getElementById('mob-' + t);
                if (el) el.classList.toggle('active', t === tag);
            });

            renderFiles();
        }

        function visibleIndices() {
            return photos
                .map((p, i) => ({ p, i }))
                .filter(({ p }) => activeTag === 'all' || p.tags.includes(activeTag))
                .map(({ i }) => i);
        }

        // ── render rows ──
        function renderFiles() {
            const list = document.getElementById('fileList');
            list.innerHTML = '';
            const vis = visibleIndices();

            document.getElementById('noResults').style.display = vis.length === 0 ? 'block' : 'none';
            document.getElementById('toolbarCount').textContent = vis.length + ' item' + (vis.length !== 1 ? 's' : '');

            vis.forEach(i => {
                const p = photos[i];
                const row = document.createElement('div');
                row.className = 'file-row' + (selectedIdx === i ? ' selected' : '');
                row.innerHTML = `
        <div class="file-name">
          <div class="file-icon"><img src="${p.url}" loading="lazy"/></div>
          <span>${p.name}</span>
        </div>
        <div class="file-date">${p.date}</div>
        <div class="file-size">${p.size}</div>
      `;
                row.addEventListener('click', () => openPreview(i));
                list.appendChild(row);
            });
        }

        // ── open preview ──
        function openPreview(i) {
            selectedIdx = i;
            const p = photos[i];
            const panel = document.getElementById('preview');
            panel.classList.remove('hidden');
            panel.classList.add('open');

            document.getElementById('previewName').textContent = p.name;
            document.getElementById('previewBody').innerHTML = `
      <img class="preview-img" src="${p.url}" loading="lazy"/>
      <div class="preview-meta">
        <div class="meta-row">
          <span class="meta-label">Filename</span>
          <span class="meta-val">${p.name}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Modified</span>
          <span class="meta-val">${p.date}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Size</span>
          <span class="meta-val">${p.size}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Tags</span>
          <div class="meta-tags">${p.tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}</div>
        </div>
      </div>
    `;

            updateNavButtons();
            renderFiles();
        }

        function updateNavButtons() {
            const vis = visibleIndices();
            const pos = vis.indexOf(selectedIdx);
            document.getElementById('prevBtn').disabled = pos <= 0;
            document.getElementById('nextBtn').disabled = pos >= vis.length - 1;
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            const vis = visibleIndices();
            const pos = vis.indexOf(selectedIdx);
            if (pos > 0) openPreview(vis[pos - 1]);
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            const vis = visibleIndices();
            const pos = vis.indexOf(selectedIdx);
            if (pos < vis.length - 1) openPreview(vis[pos + 1]);
        });

        // ── keyboard nav ──
        document.addEventListener('keydown', e => {
            if (selectedIdx === null) return;
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); document.getElementById('nextBtn').click(); }
            else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); document.getElementById('prevBtn').click(); }
            else if (e.key === 'Escape') closePreview(true);
        });

        // ── close preview ──
        function closePreview(rerender = true) {
            selectedIdx = null;
            const panel = document.getElementById('preview');
            panel.classList.add('hidden');
            panel.classList.remove('open');
            if (rerender) renderFiles();
        }

        document.getElementById('closeBtn').addEventListener('click', () => closePreview(true));

        buildSidebar();
        buildTagBar();
        renderFiles();
    </script>

        navLinks.forEach(link => {
            link.classList.remove('active');

            if (link.dataset.section === sectionId) {
                link.classList.add('active');
            }

            // me.html, ABOUT active
            if (
                link.dataset.page === 'about' &&
                window.location.pathname.includes('me.html')
            ) {
                link.classList.add('active');
            }
        });
    }

    // nav scroll active
    const sections = document.querySelectorAll('section');

    window.addEventListener('scroll', () => {
        let scrollPosition = window.scrollY + window.innerHeight / 2; // center of the screen

        let activeSet = false;

        sections.forEach(sec => {
            const top = sec.offsetTop;
            const bottom = top + sec.offsetHeight;

            if (scrollPosition >= top && scrollPosition < bottom) {
                setActiveLink(sec.id);
                activeSet = true;
            }
        });

        // all outside section remove active
        if (!activeSet) {
            navLinks.forEach(link => link.classList.remove('active'));
        }
    });




</script>


</html>
